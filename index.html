<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>H-E-B Manufacturing | Shrink & COLO Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0c0e14;--surface:#141720;--card:#1a1e2b;--border:#252a3a;--hover:#222840;--text:#d0d4e0;--muted:#6b7190;--white:#f0f2f8;--blue:#4a7dff;--blue2:#3560cc;--red:#e5463d;--green:#4ade80;--amber:#fbbf24;--purple:#a78bfa;--cyan:#67e8f9;--pink:#f472b6}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.mono{font-family:'JetBrains Mono',monospace}
.hdr{background:linear-gradient(135deg,#161a28,#1e2338);padding:14px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr-left{display:flex;align-items:center;gap:14px}
.hdr .logo{width:40px;height:40px;background:var(--red);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:#fff}
.hdr h1{font-size:17px;font-weight:700;color:var(--white)}
.hdr .sub{font-size:11px;color:var(--muted);margin-top:1px}
.tabs{display:flex;gap:2px;background:var(--surface);border-radius:8px;padding:3px}
.tab{padding:6px 14px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;color:var(--muted);transition:all 0.15s}
.tab:hover{color:var(--text)}.tab.active{background:var(--blue);color:#fff}
.filters{background:var(--surface);padding:10px 28px;border-bottom:1px solid var(--border);display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.fg{display:flex;align-items:center;gap:5px}
.fg label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted)}
.fg select{background:var(--card);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:5px;font-size:11px;font-family:'DM Sans';cursor:pointer;max-width:140px}
.fg select:focus{outline:none;border-color:var(--blue)}
.btn{border:none;padding:5px 12px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans';transition:all 0.15s}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#d03830}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{background:var(--blue2)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}.btn-ghost:hover{color:var(--white);border-color:var(--muted)}
.main{padding:16px 28px;display:flex;flex-direction:column;gap:14px}
.row{display:grid;gap:14px}
.r4{grid-template-columns:repeat(4,1fr)}.r3{grid-template-columns:repeat(3,1fr)}.r2{grid-template-columns:1fr 1fr}
.kpi{background:var(--card);border-radius:10px;padding:14px 16px;border:1px solid var(--border);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.kb::before{background:var(--blue)}.kpi.kr::before{background:var(--red)}.kpi.kg::before{background:var(--green)}.kpi.ka::before{background:var(--amber)}
.kpi .kl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:3px}
.kpi .kv{font-size:24px;font-weight:700;letter-spacing:-0.5px;font-variant-numeric:tabular-nums}
.kpi .kv.blue{color:var(--blue)}.kpi .kv.red{color:var(--red)}.kpi .kv.green{color:var(--green)}.kpi .kv.amber{color:var(--amber)}
.kpi .kd{font-size:10px;color:var(--muted);margin-top:2px}
.card{background:var(--card);border-radius:10px;padding:16px;border:1px solid var(--border)}
.card h2{font-size:13px;font-weight:700;color:var(--white);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.badge{display:inline-block;padding:1px 7px;border-radius:8px;font-size:9px;font-weight:600}
.bb{background:rgba(74,125,255,0.15);color:var(--blue)}.br{background:rgba(229,70,61,0.15);color:var(--red)}
.tw{max-height:340px;overflow-y:auto}.tw::-webkit-scrollbar{width:3px}.tw::-webkit-scrollbar-track{background:var(--surface)}.tw::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:left;padding:6px 8px;font-weight:700;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--card);z-index:1}
td{padding:5px 8px;border-bottom:1px solid rgba(37,42,58,0.5)}
tr.ck{cursor:pointer;transition:background 0.1s}tr.ck:hover td{background:var(--hover)}
.mo{color:var(--green);font-weight:600;font-family:'JetBrains Mono',monospace;font-size:11px}
.ct{color:var(--blue);font-weight:700;font-family:'JetBrains Mono',monospace}
.bw{display:flex;align-items:center;gap:6px}
.br2{height:6px;border-radius:3px;min-width:2px;transition:width 0.4s}
.bb2{background:linear-gradient(90deg,var(--blue),#6b93ff)}.rr2{background:linear-gradient(90deg,var(--red),#f06b5e)}.gg2{background:linear-gradient(90deg,var(--green),#6ee7a0)}.aa2{background:linear-gradient(90deg,var(--amber),#fcd34d)}.pp2{background:linear-gradient(90deg,var(--purple),#c4b5fd)}
.cht{display:flex;align-items:flex-end;gap:2px;height:110px;padding:8px 0}
.cb{flex:1;border-radius:3px 3px 0 0;min-height:2px;position:relative;cursor:pointer;transition:opacity 0.15s;background:linear-gradient(180deg,var(--blue),var(--blue2))}
.cb:hover{opacity:0.75}.cb .tt{display:none;position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:#2a2e40;color:var(--white);padding:4px 8px;border-radius:4px;font-size:10px;white-space:nowrap;z-index:10;border:1px solid var(--border)}.cb:hover .tt{display:block}
.cl{display:flex;gap:2px;font-size:8px;color:var(--muted);margin-top:3px}.cl span{flex:1;text-align:center}
.tg{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600}
.t-destroy{background:rgba(229,70,61,0.12);color:#f87171}.t-release{background:rgba(74,222,128,0.12);color:#4ade80}.t-rework{background:rgba(251,191,36,0.12);color:#fbbf24}.t-hold{background:rgba(129,140,248,0.12);color:#818cf8}.t-return{background:rgba(103,232,249,0.12);color:#67e8f9}.t-donate{background:rgba(192,132,252,0.12);color:#c084fc}.t-unknown{background:rgba(107,113,144,0.12);color:var(--muted)}
.bc{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);margin-bottom:8px}.bc .lk{color:var(--blue);cursor:pointer;font-weight:600}.bc .lk:hover{text-decoration:underline}
.upload-zone{border:2px dashed var(--border);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:all 0.2s;margin-bottom:14px}
.upload-zone:hover{border-color:var(--blue);background:rgba(74,125,255,0.05)}
.upload-zone.dragover{border-color:var(--green);background:rgba(74,222,128,0.05)}
.upload-zone p{color:var(--muted);font-size:12px;margin-top:6px}
.upload-zone .icon{font-size:28px;margin-bottom:4px}
.status-msg{padding:8px 14px;border-radius:6px;font-size:12px;margin-bottom:10px;display:none}
.status-msg.show{display:block}
.status-msg.success{background:rgba(74,222,128,0.1);color:var(--green);border:1px solid rgba(74,222,128,0.2)}
.status-msg.error{background:rgba(229,70,61,0.1);color:var(--red);border:1px solid rgba(229,70,61,0.2)}
@media(max-width:1100px){.r4{grid-template-columns:repeat(2,1fr)}.r3,.r2{grid-template-columns:1fr}}
@media(max-width:600px){.r4{grid-template-columns:1fr}.main{padding:12px 14px}.filters{padding:8px 14px}.hdr{padding:12px 14px}}
</style>
</head>

function renderFilters(){

    if(S.dept!=='All'&&D.siteDeptLines[S.site][S.dept]) lines=[...lines,...D.siteDeptLines[S.site][S.dept]];

function getRC(){
  let src=S.site==='All'?D.byRC:D.bySiteRC.filter(r=>r.Site===S.site);
  if(S.month!=='All'){
    // Use byMonthSite for monthly filtering - approximate
    return src;
  }
  const m={};src.forEach(r=>{const k=r['Underlying Root Cause'];if(!m[k])m[k]={_k:k,n:0,co:0};m[k].n+=r.n;m[k].co+=r.co;});
  return Object.values(m).sort((a,b)=>b.n-a.n);
}
function getDisp(){
  let src=S.site==='All'?D.dispByAction:D.dispBySiteAction.filter(r=>r.Site===S.site);
  const m={};src.forEach(r=>{const k=r.Action;if(!m[k])m[k]={_k:k,cnt:0,amt:0};m[k].cnt+=r.cnt;m[k].amt+=r.amt;});
  return Object.values(m).sort((a,b)=>b.amt-a.amt);
}
function getTrend(){
  let src=S.site==='All'?D.byMonth:D.byMonthSite.filter(r=>r.Site===S.site);
  return src.sort((a,b)=>(a.Month||'').localeCompare(b.Month||''));
}

// FILE UPLOAD PROCESSING
const KW_GROUPS=[
  ['Metal Detection / CCP',['metal detect','ccp reject','ccp','metal check']],
  ['Foreign Material',['foreign material','foreign matter','fm ','foreign obj','plastic piece','rubber piece','glass']],
  ['Sanitation / Cleaning',['sanitize','sanitized','cleaned','clean','sanitation','wash down','washed']],
  ['Equipment Failure / Breakdown',['equipment','machine','breakdown','malfunction','broke down','mechanical','jam']],
  ['Maintenance (PM/PNR)',['maintenance','pnr','preventive','pm not']],
  ['Expired / Date Code',['date code','expired','expir','best by','shelf life','use by','past due','code date']],
  ['Temperature Deviation',['temp','temperature','cold','freeze','frozen','thaw','cooler']],
  ['Labeling / Packaging',['label','labeling','packaging','package','mislabel','wrong label','wrong bag','wrong box']],
  ['Quality / Out of Spec',['spec','out of spec','oos','inconsistent','off spec']],
  ['Partner / Human Error',['operator','partner error','forgot','missed','not performed','failed to']],
  ['Contamination / Allergen',['contamina','cross contact','allergen','undeclared']],
  ['Weight Issue',['weight','overfill','underfill','overweight','underweight']],
  ['Product Damage',['crack','broken','damage','crushed','dent']]
];

function classifyRC(text){
  if(!text)return 'Unclassified';
  const t=String(text).toLowerCase();
  for(const [name,kws] of KW_GROUPS){if(kws.some(k=>t.includes(k)))return name;}
  return 'Other';
}

function parseDisp(text){
  if(!text)return[];
  return String(text).split('|').map(seg=>{
    seg=seg.trim();
    const am=seg.match(/(Destroy|Release|Rework|Donate|Hold|Return)/i);
    const dm=seg.match(/\$([\\d,.]+)/);
    return{a:am?am[1].charAt(0).toUpperCase()+am[1].slice(1).toLowerCase():'Unknown',v:dm?parseFloat(dm[1].replace(/,/g,'')):0};
  });
}

function processRows(rows){
  // rows = array of objects with original column names
  const holds=[];const disps=[];
  const colMap={};
  if(rows.length>0){
    const keys=Object.keys(rows[0]);
    keys.forEach(k=>{
      const kl=k.toLowerCase().trim();
      if(kl.includes('thrive')||kl.includes('hold entry'))colMap.id=k;
      if(kl==='department')colMap.dept=k;
      if(kl==='line')colMap.line=k;
      if(kl==='date'&&!kl.includes('issue'))colMap.date=k;
      if(kl.includes('reason')||kl.includes('issue'))colMap.reason=k;
      if(kl.includes('initial')&&kl.includes('colo'))colMap.colo=k;
      if(kl.includes('primary')&&kl.includes('root'))colMap.prc=k;
      if(kl.includes('secondary')&&kl.includes('root'))colMap.src=k;
      if(kl.includes('disposition'))colMap.disp=k;
      if(kl==='status')colMap.status=k;
      if(kl.includes('site'))colMap.site=k;
    });
  }
  rows.forEach(r=>{
    const id=r[colMap.id]||'';
    const site=colMap.site?r[colMap.site]:String(id).slice(0,3);
    if(!site||!/^[A-Za-z]/.test(site))return;
    const reason=r[colMap.reason]||'';
    const rc=classifyRC(reason);
    const colo=parseFloat(r[colMap.colo])||0;
    const dt=r[colMap.date]||'';
    let month='';
    if(dt){try{const d=new Date(dt);if(!isNaN(d))month=d.toISOString().slice(0,7);}catch(e){}}
    holds.push({id,site,dept:r[colMap.dept]||'',line:String(r[colMap.line]||''),date:dt,month,rc,prc:r[colMap.prc]||'Not Assigned',src:r[colMap.src]||'Not Assigned',colo});
    const dp=parseDisp(r[colMap.disp]);
    dp.forEach(d=>{disps.push({site,dept:r[colMap.dept]||'',line:String(r[colMap.line]||''),month,rc,prc:r[colMap.prc]||'Not Assigned',src:r[colMap.src]||'Not Assigned',action:d.a,amount:d.v});});
  });
  return{holds,disps};
}

function mergeData(holds,disps){
  // Rebuild all aggregation tables
  function groupBy(arr,keyFn,valFn){
    const m={};
    arr.forEach(r=>{const k=JSON.stringify(keyFn(r));if(!m[k])m[k]={keys:keyFn(r),n:0,co:0};valFn(m[k],r);});
    return Object.values(m).map(v=>({...v.keys,n:v.n,co:Math.round(v.co*100)/100}));
  }
  const h=holds;
  D.bySite=groupBy(h,r=>({Site:r.site}),(a,r)=>{a.n++;a.co+=r.colo;});
  D.bySiteDept=groupBy(h,r=>({Site:r.site,Department:r.dept}),(a,r)=>{a.n++;a.co+=r.colo;});
  D.bySiteDeptLine=groupBy(h,r=>({Site:r.site,Department:r.dept,Line:r.line}),(a,r)=>{a.n++;a.co+=r.colo;});
  D.byRC=groupBy(h,r=>({'Underlying Root Cause':r.rc}),(a,r)=>{a.n++;a.co+=r.colo;});
  D.byRCDrill=groupBy(h,r=>({'Underlying Root Cause':r.rc,'Primary Root Cause':r.prc,'Secondary Root Cause':r.src}),(a,r)=>{a.n++;a.co+=r.colo;});
  D.bySiteRC=groupBy(h,r=>({Site:r.site,'Underlying Root Cause':r.rc}),(a,r)=>{a.n++;a.co+=r.colo;});
  D.bySiteRCDrill=groupBy(h,r=>({Site:r.site,'Underlying Root Cause':r.rc,'Primary Root Cause':r.prc,'Secondary Root Cause':r.src}),(a,r)=>{a.n++;a.co+=r.colo;});
  D.byMonth=groupBy(h.filter(r=>r.month),r=>({Month:r.month}),(a,r)=>{a.n++;a.co+=r.colo;});
  D.byMonthSite=groupBy(h.filter(r=>r.month),r=>({Month:r.month,Site:r.site}),(a,r)=>{a.n++;a.co+=r.colo;});
  
  function dGroupBy(arr,keyFn){
    const m={};
    arr.forEach(r=>{const k=JSON.stringify(keyFn(r));if(!m[k])m[k]={keys:keyFn(r),cnt:0,amt:0};m[k].cnt++;m[k].amt+=r.amount;});
    return Object.values(m).map(v=>({...v.keys,cnt:v.cnt,amt:Math.round(v.amt*100)/100}));
  }
  D.dispByAction=dGroupBy(disps,r=>({Action:r.action}));
  D.dispBySiteAction=dGroupBy(disps,r=>({Site:r.site,Action:r.action}));
  D.dispByRCAction=dGroupBy(disps,r=>({'Underlying Root Cause':r.rc,Action:r.action}));
  D.dispByActionRC=dGroupBy(disps,r=>({Action:r.action,'Underlying Root Cause':r.rc}));
  D.dispByActionDrill=dGroupBy(disps,r=>({Action:r.action,'Underlying Root Cause':r.rc,'Primary Root Cause':r.prc,'Secondary Root Cause':r.src}));
  D.dispByMonthAction=dGroupBy(disps,r=>({Month:r.month,Action:r.action}));
  
  D.sites=[...new Set(h.map(r=>r.site))].sort();
  D.months=[...new Set(h.filter(r=>r.month).map(r=>r.month))].sort();
  const sdl={};h.forEach(r=>{if(!sdl[r.site])sdl[r.site]={};if(!sdl[r.site][r.dept])sdl[r.site][r.dept]=[];if(r.line&&!sdl[r.site][r.dept].includes(r.line))sdl[r.site][r.dept].push(r.line);});
  for(const s in sdl)for(const d in sdl[s])sdl[s][d].sort();
  D.siteDeptLines=sdl;
}

// Global holds for merge
let ALL_HOLDS=[];let ALL_DISPS=[];

function initFromOriginal(){
  // Parse original data back into row-level for merging
  // We will reconstruct from aggregated data on first load, then switch to row-level after upload
}

function setupUpload(){
  const zone=document.getElementById('dropZone');
  const input=document.getElementById('fileInput');
  if(!zone)return;
  zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('dragover');});
  zone.addEventListener('dragleave',()=>zone.classList.remove('dragover'));
  zone.addEventListener('drop',e=>{e.preventDefault();zone.classList.remove('dragover');handleFiles(e.dataTransfer.files);});
  input.onchange=e=>handleFiles(e.target.files);
}

function handleFiles(files){
  const msg=document.getElementById('statusMsg');
  const preview=document.getElementById('uploadPreview');
  Array.from(files).forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        let rows;
        if(file.name.endsWith('.csv')){
          const text=e.target.result;
          const lines=text.split('\n').filter(l=>l.trim());
          const headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
          rows=lines.slice(1).map(line=>{
            const vals=line.split(',').map(v=>v.trim().replace(/^"|"$/g,''));
            const obj={};headers.forEach((h,i)=>obj[h]=vals[i]||'');return obj;
          });
        }else{
          const data=new Uint8Array(e.target.result);
          const wb=XLSX.read(data,{type:'array',cellDates:true});
          const ws=wb.Sheets[wb.SheetNames[0]];
          rows=XLSX.utils.sheet_to_json(ws,{defval:''});
        }
        const{holds,disps}=processRows(rows);
        if(holds.length===0){
          msg.className='status-msg show error';
          msg.textContent='Could not find matching columns. Ensure your file has Thrive Hold Entry, Department, Line, Date, Reason or Issue, Initial Total COLO, Primary/Secondary Root Cause, and Disposition columns.';
          return;
        }
        // Merge with existing
        ALL_HOLDS=ALL_HOLDS.concat(holds);
        ALL_DISPS=ALL_DISPS.concat(disps);
        mergeData(ALL_HOLDS,ALL_DISPS);
        msg.className='status-msg show success';
        msg.textContent='Successfully loaded '+holds.length+' records from '+file.name+'. Total records: '+ALL_HOLDS.length;
        preview.innerHTML='<div style="margin-top:10px;font-size:12px;color:var(--muted)">New sites: '+D.sites.join(', ')+'<br>Total incidents: '+D.bySite.reduce((s,r)=>s+r.n,0).toLocaleString()+'<br>Click any tab above to see updated data.</div>';
      }catch(err){
        msg.className='status-msg show error';
        msg.textContent='Error processing '+file.name+': '+err.message;
      }
    };
    if(file.name.endsWith('.csv'))reader.readAsText(file);
    else reader.readAsArrayBuffer(file);
  });
}

// Initialize - parse original aggregated data into row-level approximation
// Since we have the aggregated data, we use it directly until new data is uploaded
// When files are uploaded, we switch to row-level processing
(function init(){
  // Reconstruct approximate row-level from bySiteRCDrill for merge capability
  D.bySiteRCDrill.forEach(r=>{
    for(let i=0;i<r.n;i++){
      ALL_HOLDS.push({id:'ORIG',site:r.Site,dept:'',line:'',date:'',month:'',rc:r['Underlying Root Cause'],prc:r['Primary Root Cause']||'Not Assigned',src:r['Secondary Root Cause']||'Not Assigned',colo:r.co/r.n});
    }
  });
  D.dispByActionDrill.forEach(r=>{
    for(let i=0;i<r.cnt;i++){
      ALL_DISPS.push({site:'',dept:'',line:'',month:'',rc:r['Underlying Root Cause'],prc:r['Primary Root Cause']||'Not Assigned',src:r['Secondary Root Cause']||'Not Assigned',action:r.Action,amount:r.amt/r.cnt});
    }
  });
  render();
})();
