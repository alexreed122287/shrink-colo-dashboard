<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>H-E-B Manufacturing | Shrink & COLO Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0c0e14;--surface:#141720;--card:#1a1e2b;--border:#252a3a;--hover:#222840;--text:#d0d4e0;--muted:#6b7190;--white:#f0f2f8;--blue:#4a7dff;--blue2:#3560cc;--red:#e5463d;--green:#4ade80;--amber:#fbbf24;--purple:#a78bfa;--cyan:#67e8f9;--pink:#f472b6}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.mono{font-family:'JetBrains Mono',monospace}

/* HEADER */
.hdr{background:linear-gradient(135deg,#161a28,#1e2338);padding:16px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.hdr-left{display:flex;align-items:center;gap:16px}
.hdr .logo{width:42px;height:42px;background:var(--red);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:#fff;letter-spacing:-0.5px}
.hdr h1{font-size:18px;font-weight:700;color:var(--white);letter-spacing:-0.3px}
.hdr .sub{font-size:11px;color:var(--muted);margin-top:1px}
.hdr-right{display:flex;gap:8px;align-items:center}

/* FILTERS */
.filters{background:var(--surface);padding:10px 28px;border-bottom:1px solid var(--border);display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.fg{display:flex;align-items:center;gap:5px}
.fg label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted)}
.fg select{background:var(--card);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:5px;font-size:11px;font-family:'DM Sans';cursor:pointer;max-width:140px}
.fg select:focus{outline:none;border-color:var(--blue)}
.btn{border:none;padding:5px 12px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans';transition:all 0.15s}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#d03830}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}.btn-ghost:hover{color:var(--white);border-color:var(--muted)}

/* LAYOUT */
.main{padding:16px 28px;display:flex;flex-direction:column;gap:14px}
.row{display:grid;gap:14px}
.row-4{grid-template-columns:repeat(4,1fr)}
.row-3{grid-template-columns:repeat(3,1fr)}
.row-2{grid-template-columns:1fr 1fr}
.row-12{grid-template-columns:1fr 2fr}
.row-21{grid-template-columns:2fr 1fr}

/* KPI */
.kpi{background:var(--card);border-radius:10px;padding:16px 18px;border:1px solid var(--border);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.k-blue::before{background:var(--blue)}.kpi.k-red::before{background:var(--red)}.kpi.k-green::before{background:var(--green)}.kpi.k-amber::before{background:var(--amber)}
.kpi .kl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:4px}
.kpi .kv{font-size:26px;font-weight:700;letter-spacing:-0.5px;font-variant-numeric:tabular-nums}
.kpi .kv.blue{color:var(--blue)}.kpi .kv.red{color:var(--red)}.kpi .kv.green{color:var(--green)}.kpi .kv.amber{color:var(--amber)}
.kpi .kd{font-size:10px;color:var(--muted);margin-top:2px}

/* CARD */
.card{background:var(--card);border-radius:10px;padding:16px 18px;border:1px solid var(--border)}
.card h2{font-size:13px;font-weight:700;color:var(--white);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.badge{display:inline-block;padding:1px 7px;border-radius:8px;font-size:9px;font-weight:600}
.badge-blue{background:rgba(74,125,255,0.15);color:var(--blue)}
.badge-red{background:rgba(229,70,61,0.15);color:var(--red)}

/* TABLE */
.tbl-wrap{max-height:340px;overflow-y:auto}
.tbl-wrap::-webkit-scrollbar{width:3px}.tbl-wrap::-webkit-scrollbar-track{background:var(--surface)}.tbl-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:left;padding:6px 8px;font-weight:700;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--card);z-index:1}
td{padding:5px 8px;border-bottom:1px solid rgba(37,42,58,0.5)}
tr.click{cursor:pointer;transition:background 0.1s}
tr.click:hover td{background:var(--hover)}
tr.active td{background:rgba(74,125,255,0.08);border-left:2px solid var(--blue)}
.money{color:var(--green);font-weight:600;font-family:'JetBrains Mono',monospace;font-size:11px}
.cnt{color:var(--blue);font-weight:700;font-family:'JetBrains Mono',monospace}

/* BARS */
.bar-w{display:flex;align-items:center;gap:6px}
.bar{height:6px;border-radius:3px;min-width:2px;transition:width 0.4s ease}
.bar-b{background:linear-gradient(90deg,var(--blue),#6b93ff)}
.bar-r{background:linear-gradient(90deg,var(--red),#f06b5e)}
.bar-g{background:linear-gradient(90deg,var(--green),#6ee7a0)}
.bar-a{background:linear-gradient(90deg,var(--amber),#fcd34d)}
.bar-p{background:linear-gradient(90deg,var(--purple),#c4b5fd)}

/* CHART */
.chart{display:flex;align-items:flex-end;gap:2px;height:110px;padding:8px 0}
.chart-bar{flex:1;border-radius:3px 3px 0 0;min-height:2px;position:relative;cursor:pointer;transition:opacity 0.15s}
.chart-bar:hover{opacity:0.75}
.chart-bar .tt{display:none;position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:#2a2e40;color:var(--white);padding:4px 8px;border-radius:4px;font-size:10px;white-space:nowrap;z-index:10;border:1px solid var(--border);pointer-events:none}
.chart-bar:hover .tt{display:block}
.chart-labels{display:flex;gap:2px;font-size:8px;color:var(--muted);margin-top:3px}
.chart-labels span{flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* TAGS */
.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600}
.tag-destroy{background:rgba(229,70,61,0.12);color:#f87171}
.tag-release{background:rgba(74,222,128,0.12);color:#4ade80}
.tag-rework{background:rgba(251,191,36,0.12);color:#fbbf24}
.tag-hold{background:rgba(129,140,248,0.12);color:#818cf8}
.tag-return{background:rgba(103,232,249,0.12);color:#67e8f9}
.tag-donate{background:rgba(192,132,252,0.12);color:#c084fc}
.tag-unknown{background:rgba(107,113,144,0.12);color:var(--muted)}

/* BREADCRUMB */
.bc{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);margin-bottom:8px}
.bc span.link{color:var(--blue);cursor:pointer;font-weight:600}.bc span.link:hover{text-decoration:underline}
.bc .sep{color:var(--border)}

/* RESPONSIVE */
@media(max-width:1100px){.row-4{grid-template-columns:repeat(2,1fr)}.row-3,.row-2,.row-12,.row-21{grid-template-columns:1fr}}
@media(max-width:600px){.row-4{grid-template-columns:1fr}.main{padding:12px 14px}.filters{padding:8px 14px}.hdr{padding:12px 14px}}

/* TABS */
.tabs{display:flex;gap:2px;background:var(--surface);border-radius:8px;padding:3px}
.tab{padding:6px 14px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;color:var(--muted);transition:all 0.15s}
.tab:hover{color:var(--text)}
.tab.active{background:var(--blue);color:#fff}

/* PAGE SECTIONS */
.page{display:none}.page.show{display:block}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-left">
    <div class="logo">H-E-B</div>
    <div><h1>Shrink & COLO Analysis</h1><div class="sub">Manufacturing Quality Dashboard | Mar 2025 – Mar 2026</div></div>
  </div>
  <div class="hdr-right">
    <div class="tabs" id="tabs"></div>
  </div>
</div>
<div class="filters" id="filters"></div>
<div class="main" id="main"></div>

<script>
// Decompress data
const B64= + b64data + r;
function dec(b64){const b=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));const ds=new DecompressionStream('gzip');const r=new Response(new Blob([b]).stream().pipeThrough(ds));return r.text()}
let D;

const S={site:'All',dept:'All',line:'All',month:'All',page:'overview',rcDrill:null,dispDrill:null,siteDrill:null};

const fmt$=v=>'$'+Number(v||0).toLocaleString('en-US',{maximumFractionDigits:0});
const fmtN=v=>Number(v||0).toLocaleString();
const tagCls=a=>'tag-'+(a||'unknown').toLowerCase();
const barCls=a=>{const m={Destroy:'bar-r',Release:'bar-g',Rework:'bar-a',Hold:'bar-p',Return:'bar-b',Donate:'bar-p'};return m[a]||'bar-b'};

function filt(arr,extra){
  return arr.filter(r=>{
    if(S.site!=='All'&&r.Site!==S.site) return false;
    if(S.dept!=='All'&&r.Department!==S.dept) return false;
    if(S.month!=='All'&&r.Month!==S.month) return false;
    if(extra) return extra(r);
    return true;
  });
}

function aggBy(arr,key,valKeys=['n','co']){
  const m={};
  arr.forEach(r=>{
    const k=typeof key==='function'?key(r):r[key];
    if(!m[k]) m[k]={_k:k};
    valKeys.forEach(vk=>{m[k][vk]=(m[k][vk]||0)+(r[vk]||0)});
  });
  return Object.values(m);
}

function renderFilters(){
  const sites=['All',...D.sites];
  let depts=['All'];
  let lines=['All'];
  if(S.site!=='All'&&D.siteDeptLines[S.site]){
    depts=[...depts,...Object.keys(D.siteDeptLines[S.site]).sort()];
    if(S.dept!=='All'&&D.siteDeptLines[S.site][S.dept]){
      lines=[...lines,...D.siteDeptLines[S.site][S.dept]];
    }
  }
  const months=['All',...D.months];
  document.getElementById('filters').innerHTML=`
    <div class="fg"><label>Site</label><select id="fS">${sites.map(s=>`<option ${s===S.site?'selected':''}>${s}</option>`).join('')}</select></div>
    <div class="fg"><label>Dept</label><select id="fD">${depts.map(s=>`<option ${s===S.dept?'selected':''}>${s}</option>`).join('')}</select></div>
    <div class="fg"><label>Line</label><select id="fL">${lines.map(s=>`<option ${s===S.line?'selected':''}>${s}</option>`).join('')}</select></div>
    <div class="fg"><label>Month</label><select id="fM">${months.map(s=>`<option ${s===S.month?'selected':''}>${s}</option>`).join('')}</select></div>
    <button class="btn btn-red" onclick="S.site='All';S.dept='All';S.line='All';S.month='All';S.rcDrill=null;S.dispDrill=null;S.siteDrill=null;render()">Reset</button>
  `;
  document.getElementById('fS').onchange=e=>{S.site=e.target.value;S.dept='All';S.line='All';S.rcDrill=null;S.dispDrill=null;render()};
  document.getElementById('fD').onchange=e=>{S.dept=e.target.value;S.line='All';render()};
  document.getElementById('fL').onchange=e=>{S.line=e.target.value;render()};
  document.getElementById('fM').onchange=e=>{S.month=e.target.value;render()};
}

function renderTabs(){
  const tabs=[{id:'overview',label:'Overview'},{id:'rootcause',label:'Root Cause'},{id:'disposition',label:'Disposition'},{id:'sites',label:'Sites'}];
  document.getElementById('tabs').innerHTML=tabs.map(t=>`<div class="tab ${S.page===t.id?'active':''}" onclick="S.page='${t.id}';S.rcDrill=null;S.dispDrill=null;S.siteDrill=null;render()">${t.label}</div>`).join('');
}

function getRC(){
  let src=S.site==='All'?D.byRC:D.bySiteRC;
  let data=S.site==='All'?src:src.filter(r=>r.Site===S.site);
  if(S.month!=='All') return []; // monthly filter needs different source
  return aggBy(data,'Underlying Root Cause').sort((a,b)=>b.n-a.n);
}

function getDisp(){
  let src=S.site==='All'?D.dispByAction:D.dispBySiteAction;
  let data=S.site==='All'?src:src.filter(r=>r.Site===S.site);
  return aggBy(data,'Action',['cnt','amt']).sort((a,b)=>b.amt-a.amt);
}

function getTrend(){
  let src=S.site==='All'?D.byMonth:D.byMonthSite;
  let data=S.site==='All'?src:src.filter(r=>r.Site===S.site);
  return data.sort((a,b)=>a.Month.localeCompare(b.Month));
}

function renderOverview(){
  const rc=getRC();const disp=getDisp();const trend=getTrend();
  const totInc=rc.reduce((s,r)=>s+r.n,0);
  const totCOLO=rc.reduce((s,r)=>s+r.co,0);
  const totDisp=disp.reduce((s,r)=>s+r.amt,0);
  const totDestroy=disp.find(d=>d._k==='Destroy');
  const maxI=Math.max(...rc.map(r=>r.n),1);
  const maxD=Math.max(...disp.map(r=>r.amt),1);
  const maxT=Math.max(...trend.map(r=>r.n),1);

  return `
  <div class="row row-4">
    <div class="kpi k-blue"><div class="kl">Total Incidents</div><div class="kv blue">${fmtN(totInc)}</div><div class="kd">${S.site==='All'?D.sites.length+' sites':S.site}</div></div>
    <div class="kpi k-red"><div class="kl">Initial COLO (at risk)</div><div class="kv red">${fmt$(totCOLO)}</div></div>
    <div class="kpi k-amber"><div class="kl">Total Dispositioned</div><div class="kv amber">${fmt$(totDisp)}</div></div>
    <div class="kpi k-green"><div class="kl">Destroyed</div><div class="kv red">${fmt$(totDestroy?totDestroy.amt:0)}</div><div class="kd">${totDestroy?Math.round(totDestroy.amt/totDisp*100):0}% of disposition $</div></div>
  </div>

  <div class="card">
    <h2>Monthly Trend <span class="badge badge-blue">${trend.length} months</span></h2>
    <div class="chart">${trend.map(r=>`<div class="chart-bar" style="height:${(r.n/maxT)*100}%;background:linear-gradient(180deg,var(--blue),var(--blue2))"><div class="tt">${r.Month}<br>${r.n} incidents | ${fmt$(r.co)}</div></div>`).join('')}</div>
    <div class="chart-labels">${trend.map(r=>`<span>${r.Month.slice(2)}</span>`).join('')}</div>
  </div>

  <div class="row row-2">
    <div class="card">
      <h2>Underlying Root Cause <span class="badge badge-blue">${rc.length}</span></h2>
      <div class="tbl-wrap"><table><thead><tr><th>Root Cause</th><th>Incidents</th><th></th><th>COLO</th></tr></thead><tbody>
      ${rc.slice(0,15).map(r=>`<tr class="click" onclick="S.page='rootcause';S.rcDrill='${r._k.replace(/'/g,"\'")}';render()"><td>${r._k}</td><td class="cnt">${fmtN(r.n)}</td><td><div class="bar-w"><div class="bar bar-b" style="width:${(r.n/maxI)*100}px"></div></div></td><td class="money">${fmt$(r.co)}</td></tr>`).join('')}
      </tbody></table></div>
    </div>
    <div class="card">
      <h2>Disposition Breakdown <span class="badge badge-red">${fmtN(disp.reduce((s,r)=>s+r.cnt,0))} items</span></h2>
      <div class="tbl-wrap"><table><thead><tr><th>Action</th><th>Count</th><th></th><th>Amount</th></tr></thead><tbody>
      ${disp.map(r=>`<tr class="click" onclick="S.page='disposition';S.dispDrill='${r._k}';render()"><td><span class="tag ${tagCls(r._k)}">${r._k}</span></td><td class="cnt">${fmtN(r.cnt)}</td><td><div class="bar-w"><div class="bar ${barCls(r._k)}" style="width:${(r.amt/maxD)*100}px"></div></div></td><td class="money">${fmt$(r.amt)}</td></tr>`).join('')}
      </tbody></table></div>
    </div>
  </div>

  <div class="card">
    <h2>Site Comparison</h2>
    <div class="tbl-wrap"><table><thead><tr><th>Site</th><th>Incidents</th><th></th><th>Initial COLO</th></tr></thead><tbody>
    ${D.bySite.sort((a,b)=>b.n-a.n).map(r=>{const mx=Math.max(...D.bySite.map(s=>s.n));return`<tr class="click" onclick="S.site='${r.Site}';S.dept='All';S.line='All';render()"><td style="font-weight:700;color:var(--blue)">${r.Site}</td><td class="cnt">${fmtN(r.n)}</td><td><div class="bar-w"><div class="bar bar-b" style="width:${(r.n/mx)*140}px"></div></div></td><td class="money">${fmt$(r.co)}</td></tr>`}).join('')}
    </tbody></table></div>
  </div>`;
}

function renderRootCause(){
  if(!S.rcDrill){
    const rc=getRC();const maxI=Math.max(...rc.map(r=>r.n),1);
    const maxC=Math.max(...rc.map(r=>r.co),1);
    return `<div class="card">
      <h2>Underlying Root Cause Analysis <span class="badge badge-blue">Click to drill down</span></h2>
      <div class="tbl-wrap"><table><thead><tr><th>Underlying Root Cause</th><th>Incidents</th><th></th><th>Initial COLO</th><th></th></tr></thead><tbody>
      ${rc.map(r=>`<tr class="click" onclick="S.rcDrill='${r._k.replace(/'/g,"\'")}';render()"><td style="font-weight:600">${r._k}</td><td class="cnt">${fmtN(r.n)}</td><td><div class="bar-w"><div class="bar bar-b" style="width:${(r.n/maxI)*120}px"></div></div></td><td class="money">${fmt$(r.co)}</td><td><div class="bar-w"><div class="bar bar-g" style="width:${(r.co/maxC)*100}px"></div></div></td></tr>`).join('')}
      </tbody></table></div>
    </div>`;
  }
  // Drilldown into Primary + Secondary
  let dd=S.site==='All'?D.byRCDrill:D.bySiteRCDrill;
  dd=dd.filter(r=>r['Underlying Root Cause']===S.rcDrill);
  if(S.site!=='All') dd=dd.filter(r=>r.Site===S.site);
  // Aggregate by Primary+Secondary
  const m={};
  dd.forEach(r=>{
    const k=r['Primary Root Cause']+'|||'+r['Secondary Root Cause'];
    if(!m[k]) m[k]={p1:r['Primary Root Cause'],p2:r['Secondary Root Cause'],n:0,co:0};
    m[k].n+=r.n;m[k].co+=r.co;
  });
  const rows=Object.values(m).sort((a,b)=>b.n-a.n);
  const maxI=Math.max(...rows.map(r=>r.n),1);

  // Get disposition for this RC
  const drc=D.dispByRCAction.filter(r=>r['Underlying Root Cause']===S.rcDrill);
  const maxDA=Math.max(...drc.map(r=>r.amt),1);

  return `<div class="row row-2">
    <div class="card">
      <div class="bc"><span class="link" onclick="S.rcDrill=null;render()">All Root Causes</span><span class="sep">›</span><span>${S.rcDrill}</span></div>
      <h2>Primary & Secondary Root Cause <span class="badge badge-blue">${rows.length} combos</span></h2>
      <div class="tbl-wrap"><table><thead><tr><th>Primary</th><th>Secondary</th><th>Incidents</th><th></th><th>COLO</th></tr></thead><tbody>
      ${rows.map(r=>`<tr><td style="font-weight:600">${r.p1}</td><td>${r.p2}</td><td class="cnt">${fmtN(r.n)}</td><td><div class="bar-w"><div class="bar bar-b" style="width:${(r.n/maxI)*80}px"></div></div></td><td class="money">${fmt$(r.co)}</td></tr>`).join('')}
      </tbody></table></div>
    </div>
    <div class="card">
      <h2>Disposition for ${S.rcDrill}</h2>
      <div class="tbl-wrap"><table><thead><tr><th>Action</th><th>Count</th><th></th><th>Amount</th></tr></thead><tbody>
      ${drc.sort((a,b)=>b.amt-a.amt).map(r=>`<tr><td><span class="tag ${tagCls(r.Action)}">${r.Action}</span></td><td class="cnt">${fmtN(r.cnt)}</td><td><div class="bar-w"><div class="bar ${barCls(r.Action)}" style="width:${(r.amt/maxDA)*80}px"></div></div></td><td class="money">${fmt$(r.amt)}</td></tr>`).join('')}
      </tbody></table></div>
    </div>
  </div>`;
}

function renderDisposition(){
  if(!S.dispDrill){
    const disp=getDisp();const maxD=Math.max(...disp.map(r=>r.amt),1);
    // Also show monthly disposition trend
    let mt=D.dispByMonthAction;
    if(S.site!=='All') mt=[];// skip for filtered
    const actions=[...new Set(mt.map(r=>r.Action))];
    return `<div class="card">
      <h2>Disposition Actions <span class="badge badge-blue">Click to drill into root causes</span></h2>
      <div class="tbl-wrap"><table><thead><tr><th>Action</th><th>Line Items</th><th>Total Amount</th><th></th><th>% of Total</th></tr></thead><tbody>
      ${disp.map(r=>{const tot=disp.reduce((s,d)=>s+d.amt,0);return`<tr class="click" onclick="S.dispDrill='${r._k}';render()"><td><span class="tag ${tagCls(r._k)}">${r._k}</span></td><td class="cnt">${fmtN(r.cnt)}</td><td class="money">${fmt$(r.amt)}</td><td><div class="bar-w"><div class="bar ${barCls(r._k)}" style="width:${(r.amt/maxD)*160}px"></div></div></td><td style="color:var(--muted)">${tot?Math.round(r.amt/tot*100):0}%</td></tr>`}).join('')}
      </tbody></table></div>
    </div>`;
  }
  // Drill into specific action → by RC → by primary/secondary
  let dd=D.dispByActionDrill.filter(r=>r.Action===S.dispDrill);
  // Aggregate by RC
  const rcMap={};
  dd.forEach(r=>{
    const k=r['Underlying Root Cause'];
    if(!rcMap[k]) rcMap[k]={rc:k,cnt:0,amt:0,children:[]};
    rcMap[k].cnt+=r.cnt;rcMap[k].amt+=r.amt;
    rcMap[k].children.push({p1:r['Primary Root Cause'],p2:r['Secondary Root Cause'],cnt:r.cnt,amt:r.amt});
  });
  const rcRows=Object.values(rcMap).sort((a,b)=>b.amt-a.amt);
  const maxA=Math.max(...rcRows.map(r=>r.amt),1);

  return `<div class="card">
    <div class="bc"><span class="link" onclick="S.dispDrill=null;render()">All Dispositions</span><span class="sep">›</span><span class="tag ${tagCls(S.dispDrill)}">${S.dispDrill}</span></div>
    <h2>${S.dispDrill} — By Root Cause <span class="badge badge-blue">${fmt$(rcRows.reduce((s,r)=>s+r.amt,0))} total</span></h2>
    <div class="tbl-wrap"><table><thead><tr><th>Underlying Root Cause</th><th>Items</th><th></th><th>Amount</th></tr></thead><tbody>
    ${rcRows.map(r=>`<tr><td style="font-weight:600">${r.rc}</td><td class="cnt">${fmtN(r.cnt)}</td><td><div class="bar-w"><div class="bar ${barCls(S.dispDrill)}" style="width:${(r.amt/maxA)*140}px"></div></div></td><td class="money">${fmt$(r.amt)}</td></tr>`).join('')}
    </tbody></table></div>
  </div>`;
}

function renderSites(){
  if(!S.siteDrill){
    const maxN=Math.max(...D.bySite.map(r=>r.n),1);
    const maxC=Math.max(...D.bySite.map(r=>r.co),1);
    return `<div class="card">
      <h2>All Sites <span class="badge badge-blue">${D.sites.length} sites</span></h2>
      <div class="tbl-wrap"><table><thead><tr><th>Site</th><th>Incidents</th><th></th><th>Initial COLO</th><th></th><th>Depts</th></tr></thead><tbody>
      ${D.bySite.sort((a,b)=>b.n-a.n).map(r=>{const dl=D.siteDeptLines[r.Site]||{};return`<tr class="click" onclick="S.siteDrill='${r.Site}';render()"><td style="font-weight:700;color:var(--blue)">${r.Site}</td><td class="cnt">${fmtN(r.n)}</td><td><div class="bar-w"><div class="bar bar-b" style="width:${(r.n/maxN)*120}px"></div></div></td><td class="money">${fmt$(r.co)}</td><td><div class="bar-w"><div class="bar bar-g" style="width:${(r.co/maxC)*100}px"></div></div></td><td>${Object.keys(dl).length}</td></tr>`}).join('')}
      </tbody></table></div>
    </div>`;
  }
  // Site drilldown: show departments → lines, RC breakdown, disposition
  const site=S.siteDrill;
  const depts=D.bySiteDept.filter(r=>r.Site===site).sort((a,b)=>b.n-a.n);
  const rcs=D.bySiteRC.filter(r=>r.Site===site).sort((a,b)=>b.n-a.n);
  const disps=D.dispBySiteAction.filter(r=>r.Site===site).sort((a,b)=>b.amt-a.amt);
  const maxDN=Math.max(...depts.map(r=>r.n),1);
  const maxRN=Math.max(...rcs.map(r=>r.n),1);
  const maxDA=Math.max(...(disps.length?disps.map(r=>r.amt):[1]),1);

  return `<div class="bc"><span class="link" onclick="S.siteDrill=null;render()">All Sites</span><span class="sep">›</span><span style="font-weight:700;color:var(--blue)">${site}</span></div>
  <div class="row row-3">
    <div class="card">
      <h2>Departments <span class="badge badge-blue">${depts.length}</span></h2>
      <div class="tbl-wrap"><table><thead><tr><th>Department</th><th>Incidents</th><th></th></tr></thead><tbody>
      ${depts.map(r=>`<tr class="click" onclick="S.site='${site}';S.dept='${(r.Department||'').replace(/'/g,"\'")}';S.page='overview';render()"><td>${r.Department||'N/A'}</td><td class="cnt">${fmtN(r.n)}</td><td><div class="bar-w"><div class="bar bar-b" style="width:${(r.n/maxDN)*70}px"></div></div></td></tr>`).join('')}
      </tbody></table></div>
    </div>
    <div class="card">
      <h2>Root Causes <span class="badge badge-blue">${rcs.length}</span></h2>
      <div class="tbl-wrap"><table><thead><tr><th>Root Cause</th><th>N</th><th></th><th>COLO</th></tr></thead><tbody>
      ${rcs.map(r=>`<tr class="click" onclick="S.site='${site}';S.page='rootcause';S.rcDrill='${(r['Underlying Root Cause']||'').replace(/'/g,"\'")}';render()"><td>${r['Underlying Root Cause']}</td><td class="cnt">${fmtN(r.n)}</td><td><div class="bar-w"><div class="bar bar-b" style="width:${(r.n/maxRN)*60}px"></div></div></td><td class="money">${fmt$(r.co)}</td></tr>`).join('')}
      </tbody></table></div>
    </div>
    <div class="card">
      <h2>Disposition <span class="badge badge-red">${fmt$(disps.reduce((s,r)=>s+r.amt,0))}</span></h2>
      <div class="tbl-wrap"><table><thead><tr><th>Action</th><th>N</th><th>Amount</th></tr></thead><tbody>
      ${disps.map(r=>`<tr><td><span class="tag ${tagCls(r.Action)}">${r.Action}</span></td><td class="cnt">${fmtN(r.cnt)}</td><td class="money">${fmt$(r.amt)}</td></tr>`).join('')}
      </tbody></table></div>
    </div>
  </div>`;
}

function render(){
  renderFilters();
  renderTabs();
  let html='';
  switch(S.page){
    case 'overview': html=renderOverview();break;
    case 'rootcause': html=renderRootCause();break;
    case 'disposition': html=renderDisposition();break;
    case 'sites': html=renderSites();break;
  }
  document.getElementById('main').innerHTML=html;
}

dec(B64).then(txt=>{D=JSON.parse(txt);render()});
</script>
</body>
</html>
