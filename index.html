<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H-E-B Shrink COLO Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#0f1117;color:#e0e0e0;min-height:100vh}
.header{background:linear-gradient(135deg,#1a1d29 0%,#252837 100%);padding:20px 32px;border-bottom:1px solid #2a2d3a;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:22px;font-weight:700;color:#fff;letter-spacing:-0.3px}
.header .subtitle{font-size:13px;color:#8b8fa3;margin-top:2px}
.header .logo{font-size:28px;font-weight:700;color:#e5463d;letter-spacing:-1px}
.filters{background:#1a1d29;padding:14px 32px;border-bottom:1px solid #2a2d3a;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.filter-group{display:flex;align-items:center;gap:6px}
.filter-group label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:#8b8fa3}
.filter-group select{background:#252837;border:1px solid #3a3d4a;color:#e0e0e0;padding:6px 10px;border-radius:6px;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer}
.filter-group select:focus{outline:none;border-color:#4a7dff}
.main{padding:20px 32px;display:flex;flex-direction:column;gap:20px}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.kpi{background:linear-gradient(135deg,#1e2130 0%,#252837 100%);border-radius:10px;padding:18px 20px;border:1px solid #2a2d3a}
.kpi .label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:#8b8fa3;margin-bottom:6px}
.kpi .value{font-size:28px;font-weight:700;color:#fff;letter-spacing:-0.5px}
.kpi .value.red{color:#e5463d}
.kpi .value.green{color:#4ade80}
.kpi .value.blue{color:#4a7dff}
.kpi .value.amber{color:#fbbf24}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.card{background:#1e2130;border-radius:10px;padding:20px;border:1px solid #2a2d3a}
.card h2{font-size:14px;font-weight:600;color:#fff;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card h2 .badge{background:#4a7dff;color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 10px;font-weight:600;color:#8b8fa3;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid #2a2d3a;position:sticky;top:0;background:#1e2130}
td{padding:7px 10px;border-bottom:1px solid #1a1d29;color:#c0c4d0}
tr:hover td{background:#252837}
tr.clickable{cursor:pointer}
tr.clickable:hover td{background:#2a3050}
.money{color:#4ade80;font-weight:500;font-variant-numeric:tabular-nums}
.money.neg{color:#e5463d}
.count{color:#4a7dff;font-weight:600;font-variant-numeric:tabular-nums}
.bar-container{display:flex;align-items:center;gap:8px}
.bar{height:8px;border-radius:4px;min-width:2px;transition:width 0.3s}
.bar.blue{background:linear-gradient(90deg,#4a7dff,#6b93ff)}
.bar.red{background:linear-gradient(90deg,#e5463d,#f06b5e)}
.bar.green{background:linear-gradient(90deg,#4ade80,#6ee7a0)}
.bar.amber{background:linear-gradient(90deg,#fbbf24,#fcd34d)}
.scrollable{max-height:380px;overflow-y:auto}
.scrollable::-webkit-scrollbar{width:4px}
.scrollable::-webkit-scrollbar-track{background:#1a1d29}
.scrollable::-webkit-scrollbar-thumb{background:#3a3d4a;border-radius:2px}
.breadcrumb{font-size:12px;color:#8b8fa3;margin-bottom:10px;display:flex;align-items:center;gap:4px}
.breadcrumb span{cursor:pointer;color:#4a7dff}
.breadcrumb span:hover{text-decoration:underline}
.trend-chart{display:flex;align-items:flex-end;gap:3px;height:100px;padding:10px 0}
.trend-bar{flex:1;background:linear-gradient(180deg,#4a7dff,#3560cc);border-radius:3px 3px 0 0;min-height:2px;position:relative;cursor:pointer}
.trend-bar:hover{opacity:0.8}
.trend-bar .tip{display:none;position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:4px 8px;border-radius:4px;font-size:10px;white-space:nowrap;z-index:10}
.trend-bar:hover .tip{display:block}
.trend-labels{display:flex;gap:3px;font-size:9px;color:#6b6f83;margin-top:4px}
.trend-labels span{flex:1;text-align:center}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.tag.destroy{background:#3b1519;color:#f87171}
.tag.release{background:#0f291a;color:#4ade80}
.tag.rework{background:#2a2410;color:#fbbf24}
.tag.hold{background:#1a1e3a;color:#818cf8}
.tag.return{background:#1a2e3a;color:#67e8f9}
.tag.donate{background:#2a1a3a;color:#c084fc}
.tag.unknown{background:#252837;color:#8b8fa3}
.reset-btn{background:#e5463d;color:#fff;border:none;padding:6px 14px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.reset-btn:hover{background:#d03830}
@media(max-width:900px){.kpi-row,.grid-2,.grid-3{grid-template-columns:1fr}}
</style>
</head>

let state = {site:'All',dept:'All',line:'All',rcDrill:null,dispDrill:null};

function fmt$(v){return '$'+Number(v||0).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0})}
function fmtN(v){return Number(v||0).toLocaleString()}

function getFiltered(){
  let rc = DATA.rc_by_site, sdl = DATA.site_dept_line, ds = DATA.disposition_by_site;
  if(state.site!=='All'){
    rc=rc.filter(r=>r.Site===state.site);
    sdl=sdl.filter(r=>r.Site===state.site);
    ds=ds.filter(r=>r.Site===state.site);
  }
  if(state.dept!=='All') sdl=sdl.filter(r=>r.Department===state.dept);
  if(state.line!=='All') sdl=sdl.filter(r=>String(r.Line)===state.line);
  // Aggregate rc
  let rcMap={};
  rc.forEach(r=>{
    if(!rcMap[r['Underlying Root Cause']]) rcMap[r['Underlying Root Cause']]={Incidents:0,Total_COLO:0};
    rcMap[r['Underlying Root Cause']].Incidents+=r.Incidents;
    rcMap[r['Underlying Root Cause']].Total_COLO+=r.Total_COLO;
  });
  let rcArr=Object.entries(rcMap).map(([k,v])=>({name:k,...v})).sort((a,b)=>b.Incidents-a.Incidents);
  // Aggregate disp
  let dMap={};
  ds.forEach(r=>{
    if(!dMap[r['Disposition Action']]) dMap[r['Disposition Action']]={Count:0,Total:0};
    dMap[r['Disposition Action']].Count+=r.Count;
    dMap[r['Disposition Action']].Total+=r.Total;
  });
  let dArr=Object.entries(dMap).map(([k,v])=>({action:k,...v})).sort((a,b)=>b.Total-a.Total);
  let totalInc=rcArr.reduce((s,r)=>s+r.Incidents,0);
  let totalCOLO=rcArr.reduce((s,r)=>s+r.Total_COLO,0);
  let totalDisp=dArr.reduce((s,r)=>s+r.Total,0);
  return {rcArr,dArr,sdl,totalInc,totalCOLO,totalDisp};
}

function renderFilters(){
  let sites=['All',...DATA.site_summary.map(s=>s.Site).sort()];
  let depts=['All',...[...new Set(DATA.site_dept_line.filter(r=>state.site==='All'||r.Site===state.site).map(r=>r.Department))].sort()];
  let lines=['All',...[...new Set(DATA.site_dept_line.filter(r=>(state.site==='All'||r.Site===state.site)&&(state.dept==='All'||r.Department===state.dept)).map(r=>String(r.Line)))].sort()];
  document.getElementById('filters').innerHTML=`
    <div class="filter-group"><label>Site</label><select id="fSite">${sites.map(s=>`<option ${s===state.site?'selected':''}>${s}</option>`).join('')}</select></div>
    <div class="filter-group"><label>Department</label><select id="fDept">${depts.map(s=>`<option ${s===state.dept?'selected':''}>${s}</option>`).join('')}</select></div>
    <div class="filter-group"><label>Line</label><select id="fLine">${lines.map(s=>`<option ${s===state.line?'selected':''}>${s}</option>`).join('')}</select></div>
    <button class="reset-btn" onclick="state={site:'All',dept:'All',line:'All',rcDrill:null,dispDrill:null};render()">Reset All</button>
  `;
  document.getElementById('fSite').onchange=e=>{state.site=e.target.value;state.dept='All';state.line='All';state.rcDrill=null;state.dispDrill=null;render()};
  document.getElementById('fDept').onchange=e=>{state.dept=e.target.value;state.line='All';render()};
  document.getElementById('fLine').onchange=e=>{state.line=e.target.value;render()};
}

function tagClass(a){return (a||'').toLowerCase().replace(/[^a-z]/g,'')}

function renderMain(){
  let {rcArr,dArr,totalInc,totalCOLO,totalDisp}=getFiltered();
  let maxInc=Math.max(...rcArr.map(r=>r.Incidents),1);
  let maxDispT=Math.max(...dArr.map(r=>r.Total),1);

  // Monthly trend
  let mt=DATA.monthly_trend;
  let maxMI=Math.max(...mt.map(r=>r.Incidents),1);

  // RC drilldown
  let rcDrillHTML='';
  if(state.rcDrill){
    let dd=DATA.root_cause_drilldown.filter(r=>r['Underlying Root Cause']===state.rcDrill);
    if(state.site!=='All'){
      dd=DATA.rc_site_drilldown.filter(r=>r['Underlying Root Cause']===state.rcDrill && r.Site===state.site);
    }
    dd.sort((a,b)=>b.Incidents-a.Incidents);
    rcDrillHTML=`<div class="card"><h2><span class="breadcrumb"><span onclick="state.rcDrill=null;render()">Root Causes</span> &rsaquo; ${state.rcDrill}</span></h2>
    <div class="scrollable"><table><thead><tr><th>Primary Root Cause</th><th>Secondary Root Cause</th><th>Incidents</th><th>Initial COLO</th></tr></thead><tbody>
    ${dd.map(r=>`<tr><td>${r['Primary Root Cause']||'N/A'}</td><td>${r['Secondary Root Cause']||'N/A'}</td><td class="count">${fmtN(r.Incidents)}</td><td class="money">${fmt$(r.Total_COLO)}</td></tr>`).join('')}
    </tbody></table></div></div>`;
  }

  // Disposition drilldown
  let dispDrillHTML='';
  if(state.dispDrill){
    let dd=DATA.disposition_by_rc.filter(r=>r['Disposition Action']===state.dispDrill);
    dd.sort((a,b)=>b.Total-a.Total);
    dispDrillHTML=`<div class="card"><h2><span class="breadcrumb"><span onclick="state.dispDrill=null;render()">Dispositions</span> &rsaquo; ${state.dispDrill}</span></h2>
    <div class="scrollable"><table><thead><tr><th>Root Cause</th><th>Count</th><th>Amount</th></tr></thead><tbody>
    ${dd.map(r=>`<tr><td>${r['Underlying Root Cause']}</td><td class="count">${fmtN(r.Count)}</td><td class="money">${fmt$(r.Total)}</td></tr>`).join('')}
    </tbody></table></div></div>`;
  }

  document.getElementById('main').innerHTML=`
    <div class="kpi-row">
      <div class="kpi"><div class="label">Total Incidents</div><div class="value blue">${fmtN(totalInc)}</div></div>
      <div class="kpi"><div class="label">Initial Total COLO</div><div class="value red">${fmt$(totalCOLO)}</div></div>
      <div class="kpi"><div class="label">Ending COLO (Dispositioned)</div><div class="value amber">${fmt$(totalDisp)}</div></div>
      <div class="kpi"><div class="label">Root Cause Categories</div><div class="value green">${rcArr.length}</div></div>
    </div>

    <div class="card">
      <h2>Monthly Incident Trend</h2>
      <div class="trend-chart">${mt.map(r=>`<div class="trend-bar" style="height:${(r.Incidents/maxMI)*100}%"><div class="tip">${r.Month}: ${r.Incidents} incidents | ${fmt$(r.Total_COLO)}</div></div>`).join('')}</div>
      <div class="trend-labels">${mt.map(r=>`<span>${r.Month.slice(2)}</span>`).join('')}</div>
    </div>

    <div class="grid-2">
      <div class="card">
        <h2>Underlying Root Cause <span class="badge">${rcArr.length} categories</span></h2>
        <div class="scrollable"><table><thead><tr><th>Root Cause</th><th>Incidents</th><th></th><th>Initial COLO</th></tr></thead><tbody>
        ${rcArr.map(r=>`<tr class="clickable" onclick="state.rcDrill='${r.name.replace(/'/g,"\'")}';render()"><td>${r.name}</td><td class="count">${fmtN(r.Incidents)}</td><td><div class="bar-container"><div class="bar blue" style="width:${(r.Incidents/maxInc)*120}px"></div></div></td><td class="money">${fmt$(r.Total_COLO)}</td></tr>`).join('')}
        </tbody></table></div>
      </div>
      <div class="card">
        <h2>Disposition (Ending COLO) <span class="badge">Click to drill</span></h2>
        <div class="scrollable"><table><thead><tr><th>Action</th><th>Count</th><th></th><th>Amount</th></tr></thead><tbody>
        ${dArr.map(r=>`<tr class="clickable" onclick="state.dispDrill='${r.action}';render()"><td><span class="tag ${tagClass(r.action)}">${r.action}</span></td><td class="count">${fmtN(r.Count)}</td><td><div class="bar-container"><div class="bar ${r.action==='Destroy'?'red':r.action==='Release'?'green':'amber'}" style="width:${(r.Total/maxDispT)*120}px"></div></div></td><td class="money">${fmt$(r.Total)}</td></tr>`).join('')}
        </tbody></table></div>
      </div>
    </div>

    ${rcDrillHTML||dispDrillHTML?`<div class="grid-2">${rcDrillHTML}${dispDrillHTML}</div>`:''}

    <div class="card">
      <h2>Site Overview</h2>
      <div class="scrollable"><table><thead><tr><th>Site</th><th>Incidents</th><th></th><th>Initial COLO</th><th>Departments</th><th>Lines</th></tr></thead><tbody>
      ${DATA.site_summary.map(r=>{let mx=Math.max(...DATA.site_summary.map(s=>s.Incidents),1);return `<tr class="clickable" onclick="state.site='${r.Site}';state.dept='All';state.line='All';render()"><td style="font-weight:600;color:#4a7dff">${r.Site}</td><td class="count">${fmtN(r.Incidents)}</td><td><div class="bar-container"><div class="bar blue" style="width:${(r.Incidents/mx)*140}px"></div></div></td><td class="money">${fmt$(r.Total_Initial_COLO)}</td><td>${r.Departments}</td><td>${r.Lines}</td></tr>`}).join('')}
      </tbody></table></div>
    </div>
  `;
}

function render(){renderFilters();renderMain()}
render();
</script>
